site_name: Dove's Personal Website
site_url: "https://jialedove.github.io/Jialedove/"
site_description: 个人知识库与数字花园
site_author: Dove

theme:
  name: material
  language: zh
  custom_dir: overrides
  features:
    - navigation.tabs
    - navigation.indexes
    - navigation.path
    - navigation.instant
    - navigation.instant.progress
    - navigation.top
    - search.highlight
    - search.suggest
    - content.code.copy
    - toc.follow
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: white
      accent: indigo
      toggle:
        icon: material/toggle-switch-off-outline
        name: 切换到深色模式
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: black
      accent: indigo
      toggle:
        icon: material/toggle-switch
        name: 切换到浅色模式
  icon:
    logo: custom/dove-line
    repo: material/github
  favicon: assets/images/branding/dove-favicon.svg

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg
  - pymdownx.superfences
  - pymdownx.tasklist:
      custom_checkbox: true
  - pymdownx.tilde
  - attr_list
  - md_in_html
  - toc:
      permalink: true
      toc_depth: 3

plugins:
  - search
  - tags
  - obsidian-interactive-graph
extra_javascript:
  - javascripts/shortcuts.js
extra_css:
  - stylesheets/extra.css

extra:
  analytics:
    provider: google
    property: G-BMLP6MP942
  social:
    - icon: material/github
      link: https://github.com/jialedove
      name: GitHub
  generator: false

copyright: Copyright &copy; 2024 - 2026 Dove

nav:
  - 知识:
    - 知识总览: knowledge.md
    - 学习方法论:
      - 原子化笔记: atomic-notes.md
      - 工具癖: tool-obsession.md
      - 认知失调: cognitive-dissonance.md
  - 文章:
    - 文章总览: articles.md
    - 书籍阐释项目: book-interpretation.md
  - 项目:
    - 项目总览: projects.md
    - 主题研究:
      - 书籍阐释项目: book-interpretation.md
    - 生活实验:
      - 菜单: menu.md
      - 西红柿鸡蛋汤: tomato-egg-soup.md
